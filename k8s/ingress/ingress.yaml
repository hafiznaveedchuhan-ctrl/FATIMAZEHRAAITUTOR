apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fatimazehra-ingress
  namespace: fatimazehra-ai-tutor
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Stripe webhooks need raw body — skip body buffering
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
spec:
  tls:
    - hosts:
        - fatimazehraaitutor.com
        - api.fatimazehraaitutor.com
      secretName: fatimazehra-tls
  rules:
    # API subdomain → backend
    - host: api.fatimazehraaitutor.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
    # Main domain → frontend
    - host: fatimazehraaitutor.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
