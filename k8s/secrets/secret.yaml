# IMPORTANT: Fill in base64-encoded values before applying.
# Encode: echo -n "value" | base64
# NEVER commit this file with real secrets — add to .gitignore or use Sealed Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: fatimazehra-secrets
  namespace: fatimazehra-ai-tutor
type: Opaque
data:
  DATABASE_URL: <base64-encoded-postgresql+asyncpg://...>
  OPENAI_API_KEY: <base64-encoded-sk-...>
  STRIPE_SECRET_KEY: <base64-encoded-sk_test_...>
  STRIPE_WEBHOOK_SECRET: <base64-encoded-whsec_...>
  NEXTAUTH_SECRET: <base64-encoded-random-secret>
  REDIS_URL: <base64-encoded-redis://...>
