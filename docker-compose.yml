version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fatimazehra-db
    environment:
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor_dev
      POSTGRES_DB: fatimazehra_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fatimazehra-network

  redis:
    image: redis:7-alpine
    container_name: fatimazehra-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fatimazehra-network

  backend:
    build: ./backend
    container_name: fatimazehra-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://tutor:tutor_dev@postgres:5432/fatimazehra_db
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - fatimazehra-network

  frontend:
    build: ./frontend
    container_name: fatimazehra-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    command: npm run dev
    networks:
      - fatimazehra-network

volumes:
  postgres_data:

networks:
  fatimazehra-network:
    driver: bridge
